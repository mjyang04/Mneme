name: Windows Desktop

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Windows desktop smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run Windows desktop checks
        run: |
          npm run windows:check
          npm run windows:test

  package:
    name: Windows installer
    runs-on: windows-latest
    needs: smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows desktop artifacts
        run: npm run windows:dist

      - name: Smoke packaged Windows app
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "dist/windows/win-unpacked/Mneme.exe"
          if (-not (Test-Path $exe)) {
            throw "Packaged executable not found: $exe"
          }

          $process = $null
          try {
            $env:MNEME_ELECTRON_SMOKE = "1"
            $process = Start-Process -FilePath $exe -WorkingDirectory (Split-Path $exe) -PassThru
            Wait-Process -InputObject $process -Timeout 30 -ErrorAction Stop
            $process.Refresh()
            if ($process.ExitCode -ne 0) {
              throw "Packaged executable smoke failed with exit code $($process.ExitCode)."
            }
          } finally {
            Remove-Item Env:MNEME_ELECTRON_SMOKE -ErrorAction SilentlyContinue
            if ($process -and -not $process.HasExited) {
              Stop-Process -InputObject $process -Force
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mneme-windows-desktop
          path: |
            dist/windows/*.exe
            dist/windows/*.blockmap
