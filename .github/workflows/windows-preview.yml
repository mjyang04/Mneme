name: Windows Preview

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Windows preview smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Windows preview tests
        run: node --test Windows/tests/windows_smoke.mjs
